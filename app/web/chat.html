<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Remote Chat</title>
<style>
  :root { --hdr: 52px; --btm: 72px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111; color: #e0e0e0; height: 100dvh; overflow: hidden;
  }
  /* === 顶部栏 (固定) === */
  .topbar {
    position: fixed; top:0; left:0; right:0; height: var(--hdr);
    background: #1a1a1a; display: flex; align-items: center; gap: 8px;
    padding: 0 10px; z-index: 20; border-bottom: 1px solid #333;
  }
  .menu-btn { background: none; border: none; color: #aaa; font-size: 20px; padding: 6px; cursor: pointer; line-height: 1; }
  .menu-btn:hover { color: #fff; }
  .topbar h1 { font-size: 15px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar select {
    background: #222; color: #ddd; border: 1px solid #444; border-radius: 6px;
    padding: 5px 8px; font-size: 12px; max-width: 130px;
  }
  .topbar .refresh-btn {
    background: #222; color: #4ade80; border: 1px solid #444; border-radius: 6px;
    font-size: 16px; padding: 4px 8px; cursor: pointer;
  }
  .topbar .user-tag {
    font-size: 11px; color: #aaa; background: #252525; border-radius: 5px;
    padding: 3px 8px; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .logout-btn {
    background: none; border: none; color: #aaa; font-size: 16px; padding: 4px 6px; cursor: pointer;
  }
  .topbar .logout-btn:hover { color: #e74c3c; }
  .topbar .admin-link {
    color: #f59e0b; text-decoration: none; font-size: 11px; font-weight: 600;
    padding: 3px 8px; border: 1px solid #5a4a1a; border-radius: 5px; background: #252015;
  }
  .topbar .admin-link:hover { background: #3a3015; }

  /* === 底部输入栏 (固定) === */
  .bottombar {
    position: fixed; bottom:0; left:0; right:0;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom,0px));
    background: #1a1a1a; border-top: 1px solid #333;
    display: flex; gap: 8px; align-items: flex-end; z-index: 20;
  }
  .bottombar textarea {
    flex: 1; background: #222; border: 1px solid #444; border-radius: 10px;
    padding: 10px 14px; color: #eee; font-size: 15px; font-family: inherit;
    resize: none; outline: none; min-height: 42px; max-height: 120px;
  }
  .bottombar textarea:focus { border-color: #4ade80; }
  .bottombar button {
    background: #4ade80; color: #111; border: none; border-radius: 10px;
    padding: 11px 18px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .bottombar button:disabled { opacity: 0.4; cursor: default; }

  /* === 消息区域 (中间滚动) === */
  .chat-area {
    position: fixed; top: var(--hdr); bottom: var(--btm);
    left:0; right:0; overflow-y: auto; padding: 16px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 15px; word-break: break-word; }
  .msg.user { background: #1a5276; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.assistant { background: #222; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg .model-tag { font-size: 10px; color: #4ade80; margin-top: 5px; padding-top: 4px; border-top: 1px solid #333; }
  .msg.system { color: #666; font-size: 12px; text-align: center; padding: 4px; background: none; }
  .msg-wrapper { display: flex; margin-bottom: 10px; }
  .msg-wrapper.user { justify-content: flex-end; }
  .msg-wrapper.assistant { justify-content: flex-start; }
  .msg-wrapper.system { justify-content: center; }
  .msg pre { background: #0d0d0d; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: 13px; }
  .msg code { background: #0d0d0d; padding: 2px 4px; border-radius: 4px; font-size: 13px; }
  .msg table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
  .msg th, .msg td { border: 1px solid #333; padding: 6px 10px; text-align: left; }
  .msg th { background: #1a1a1a; color: #ccc; font-weight: 600; }
  .msg td { background: #151515; }
  .msg h2, .msg h3, .msg h4, .msg h5 { margin: 8px 0 4px; line-height: 1.3; }
  .msg h2 { font-size: 17px; }
  .msg h3 { font-size: 15px; }
  .msg h4 { font-size: 14px; }
  .msg hr { border: none; border-top: 1px solid #333; margin: 10px 0; }
  .msg p { margin: 4px 0; }
  .msg .latex-block, .msg .latex-inline { font-family: 'Courier New', monospace; color: #f59e0b; }

  .welcome { text-align: center; padding: 30px 16px; color: #555; margin-top: 30px; }
  .welcome h2 { color: #777; font-size: 18px; margin-bottom: 6px; }

  .typing { display: inline-flex; gap: 4px; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: t 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes t { 0%,60%,100% { opacity:.3; transform:scale(.8); } 30% { opacity:1; transform:scale(1); } }

  /* === 侧边栏 (滑入) === */
  .overlay { position: fixed; inset:0; background: rgba(0,0,0,.5); z-index: 25; display: none; }
  .overlay.show { display: block; }
  .sidebar {
    position: fixed; top:0; left: 0; bottom:0; width: 280px; max-width: 85vw;
    background: #1a1a1a; z-index: 30; display: flex; flex-direction: column;
    transform: translateX(-100%); transition: transform .25s ease;
    border-right: 1px solid #333;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header {
    padding: 14px 16px; border-bottom: 1px solid #333;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 { font-size: 16px; font-weight: 600; }
  .new-chat-btn {
    background: #4ade80; color: #111; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .conv-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conv-item {
    padding: 12px 14px; margin-bottom: 4px; border-radius: 8px;
    cursor: pointer; border: 1px solid transparent; transition: background .15s;
  }
  .conv-item:hover { background: #252525; }
  .conv-item.active { background: #0f3460; border-color: #1a5276; }
  .conv-item .conv-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-item .conv-meta { font-size: 11px; color: #666; display: flex; justify-content: space-between; }
  .conv-item .del-btn {
    background: none; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 0 4px;
  }
  .conv-item .del-btn:hover { color: #e74c3c; }
  .conv-empty { text-align: center; color: #555; padding: 30px 16px; font-size: 13px; }

  /* 移动端适配 */
  @media (max-width: 480px) {
    .topbar h1 { font-size: 13px; }
    .topbar select { max-width: 100px; font-size: 11px; }
    .chat-area { padding: 10px 8px; }
    .msg { max-width: 92%; font-size: 14px; }
  }
  /* === 滚动到底部按钮 (AI回答时翻页后出现) === */
  .scroll-bottom-btn {
    position: fixed; bottom: calc(var(--btm) + 12px); right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    background: #4ade80; color: #111; border: none;
    font-size: 20px; cursor: pointer; z-index: 15;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
    transition: opacity .2s, transform .2s;
  }
  .scroll-bottom-btn:hover { opacity: 1; transform: scale(1.1); }
  .scroll-bottom-btn.show { display: flex; }

  /* === 思考过程 (collapsible) === */
  .think-section { margin-bottom: 8px; border-left: 3px solid #4ade80; background: #0d1f0d; border-radius: 0 6px 6px 0; overflow: hidden; }
  .think-header { padding: 6px 10px; font-size: 12px; color: #4ade80; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
  .think-header:hover { background: #152815; }
  .think-header .arrow { transition: transform .2s; font-size: 10px; }
  .think-header .arrow.collapsed { transform: rotate(-90deg); }
  .think-content { padding: 0 10px 8px; font-size: 12px; color: #8bc88b; line-height: 1.6; white-space: pre-wrap; word-break: break-word; display: none; }
  .think-content.open { display: block; }

  /* === 联网搜索按钮 (active=亮绿, inactive=暗灰) === */
  .search-btn { background: #1a1a1a; color: #555; border: 1px solid #333; border-radius: 8px; font-size: 20px; padding: 6px 8px; cursor: pointer; line-height: 1; flex-shrink: 0; transition: all .2s; }
  .search-btn:hover { border-color: #666; color: #888; }
  .search-btn.active { background: #064e3b; border-color: #4ade80; color: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,.3); }

  /* === 搜索结果 (collapsible) === */
  .search-results { margin-bottom: 8px; border-left: 3px solid #f59e0b; background: #1f1a0d; border-radius: 0 6px 6px 0; overflow: hidden; }
  .search-header { padding: 6px 10px; font-size: 12px; color: #f59e0b; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
  .search-header:hover { background: #2a2215; }
  .search-header .arrow { transition: transform .2s; font-size: 10px; }
  .search-header .arrow.collapsed { transform: rotate(-90deg); }
  .search-content { padding: 0 10px 8px; font-size: 12px; color: #ccc; line-height: 1.6; }
  .search-content .r-item { margin-bottom: 6px; }
  .search-content .r-title { color: #f59e0b; font-weight: 600; }
  .search-content .r-snippet { color: #aaa; }

  /* === 设置面板 === */
  .settings-btn { background: none; border: none; color: #aaa; font-size: 16px; padding: 4px 6px; cursor: pointer; line-height: 1; }
  .settings-btn:hover { color: #fff; }
  .settings-overlay { position: fixed; inset:0; background: rgba(0,0,0,.5); z-index: 40; display: none; }
  .settings-overlay.show { display: block; }
  .settings-panel {
    position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
    padding: 24px; z-index: 45; width: 320px; max-width: 90vw;
    display: none; box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .settings-panel.show { display: block; }
  .settings-panel h2 { font-size: 16px; margin-bottom: 20px; color: #e0e0e0; }
  .settings-panel .close-btn { float: right; background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
  .settings-panel .close-btn:hover { color: #fff; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { font-size: 14px; color: #ccc; }
  .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .switch input { opacity:0; width:0; height:0; }
  .switch .slider {
    position: absolute; cursor: pointer; inset:0; background: #444;
    border-radius: 24px; transition: .3s;
  }
  .switch .slider::before {
    content: ''; position: absolute; height: 18px; width: 18px;
    left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s;
  }
  .switch input:checked + .slider { background: #4ade80; }
  .switch input:checked + .slider::before { transform: translateX(20px); }

  /* === 亮色主题 === */
  body.light { background: #f0f2f5; color: #1a1a1a; }
  body.light .topbar { background: #fff; border-bottom-color: #dadce0; }
  body.light .topbar h1 { color: #1a1a1a; }
  body.light .topbar select { background: #f1f3f4; color: #1a1a1a; border-color: #dadce0; }
  body.light .topbar .refresh-btn { background: #f1f3f4; color: #16a34a; border-color: #dadce0; }
  body.light .topbar .user-tag { background: #f1f3f4; color: #555; }
  body.light .topbar .admin-link { background: #fef9e7; border-color: #f59e0b; color: #d97706; }
  body.light .settings-btn { color: #555; }
  body.light .settings-btn:hover { color: #000; }
  body.light .bottombar { background: #fff; border-top-color: #dadce0; }
  body.light .bottombar textarea { background: #f1f3f4; border-color: #dadce0; color: #1a1a1a; }
  body.light .bottombar textarea:focus { border-color: #16a34a; }
  body.light .bottombar button { background: #16a34a; color: #fff; }
  body.light .msg.assistant { background: #fff; color: #1a1a1a; border: 1px solid #e0e0e0; }
  body.light .msg .model-tag { color: #16a34a; border-top-color: #e0e0e0; }
  body.light .msg pre, body.light .msg code { background: #f6f8fa; }
  body.light .msg th { background: #f8f9fa; color: #1a1a1a; }
  body.light .msg td { background: #fff; }
  body.light .welcome { color: #888; }
  body.light .welcome h2 { color: #aaa; }
  body.light .sidebar { background: #fff; border-right-color: #dadce0; }
  body.light .sidebar-header { border-bottom-color: #dadce0; }
  body.light .sidebar-header h2 { color: #1a1a1a; }
  body.light .conv-item:hover { background: #f1f3f4; }
  body.light .conv-item .conv-meta { color: #888; }
  body.light .conv-empty { color: #888; }
  body.light .think-section { background: #f0faf4; border-left-color: #16a34a; }
  body.light .think-header { color: #16a34a; }
  body.light .think-header:hover { background: #e6f5ec; }
  body.light .think-content { color: #166534; }
  body.light .search-results { background: #fff8f0; border-left-color: #d97706; }
  body.light .search-header { color: #d97706; }
  body.light .search-header:hover { background: #fef3e7; }
  body.light .search-content .r-title a { color: #d97706 !important; }
  body.light .settings-panel { background: #fff; border-color: #dadce0; }
  body.light .settings-panel h2 { color: #1a1a1a; }
  body.light .setting-row { border-bottom-color: #e0e0e0; }
  body.light .setting-row label { color: #333; }
  body.light .switch .slider { background: #ccc; }
  body.light .switch input:checked + .slider { background: #16a34a; }
  body.light .search-btn { background: #e8eaed; border-color: #dadce0; color: #999; }
  body.light .search-btn.active { background: #dcfce7; border-color: #16a34a; color: #16a34a; box-shadow: 0 0 8px rgba(22,163,74,.2); }
  body.light ::-webkit-scrollbar-track { background: #f0f2f5; }
  body.light ::-webkit-scrollbar-thumb { background: #ccc; }
</style>
</head>
<body>

<!-- 遮罩层 -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- 侧边栏 -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>历史对话</h2>
    <button class="new-chat-btn" onclick="newChat()">+ 新建</button>
  </div>
  <div class="conv-list" id="conv-list">
    <div class="conv-empty">加载中...</div>
  </div>
</nav>

<!-- 顶部栏 -->
<header class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()" title="历史">&#x2630;</button>
  <h1 id="conv-title">AI Remote</h1>
  <select id="model-select"><option value="">加载中...</option></select>
  <button class="refresh-btn" onclick="refreshModels()" title="扫描模型">&#x21bb;</button>
  <a class="admin-link" id="admin-link" href="/admin.html" style="display:none">管理</a>
  <button class="settings-btn" onclick="toggleSettings()" title="设置">&#x2699;</button>
  <span class="user-tag" id="user-tag"></span>
  <button class="logout-btn" onclick="logout()" title="退出登录">&#x2192;</button>
</header>

<!-- 消息区 -->
<div class="chat-area" id="chat-area">
  <div class="welcome" id="welcome">
    <h2>AI Remote Compute</h2>
    <p>选择模型，开始对话</p>
  </div>
</div>
<button class="scroll-bottom-btn" id="scroll-bottom-btn" onclick="document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;this.classList.remove('show')">↓</button>

<!-- 底部输入栏 -->
<footer class="bottombar">
  <button class="search-btn" id="search-btn" onclick="toggleSearch()" title="联网搜索">🌐</button>
  <textarea id="prompt" rows="1" placeholder="输入消息..." disabled></textarea>
  <button id="send-btn" disabled>发送</button>
</footer>

<script>
// ==================== 认证守卫 ====================
const TOKEN = localStorage.getItem('token');
const USER  = JSON.parse(localStorage.getItem('user') || 'null');
if (!TOKEN || !USER) { window.location.replace('/login.html'); }

// ==================== 全局状态 ====================
const HOST = '';                         // API 同源，不需要代理
let currentOllamaUrl = '';

let currentConvId = null;
let messages = [];                       // [{role, content}, ...]
let loading = false;
let currentModel = '';
let convLoaded = false;                  // 是否已从 DB 加载过对话
let searchEnabled = false;
let lastSearchQuery = '';
let lastSearchResults = null;

// ==================== DOM ====================
const el = id => document.getElementById(id);
const chatArea  = el('chat-area');
const promptEl  = el('prompt');
const sendBtn   = el('send-btn');
const modelSel  = el('model-select');
const convList  = el('conv-list');
const overlay   = el('overlay');
const sidebar   = el('sidebar');
const convTitle = el('conv-title');

// ==================== 网络发现 (API) ====================
const OS_ICONS = { windows: '🪟', linux: '🐧', darwin: '🍎', macos: '🍎' };

async function fetchDiscovery() {
  // 整体超时：12 秒后显示离线（防止无限等待）
  const timeoutFallback = setTimeout(() => {
    if (modelSel.innerHTML.includes('加载中')) {
      modelSel.innerHTML = '<option value="">离线</option>';
      promptEl.disabled = true;
      sendBtn.disabled = true;
      promptEl.placeholder = '未检测到 Ollama 模型';
    }
  }, 12000);

  try {
    // 先尝试 API 发现（服务器端扫描 Tailscale 设备）
    if (await tryApiDiscovery()) return true;
    // 回退：直接浏览器端扫描本机 Ollama
    await tryLocalOllama();
  } finally {
    clearTimeout(timeoutFallback);
  }
}

async function tryApiDiscovery() {
  try {
    const data = await api('/api/discovery');
    if (!data || !data.nodes || data.nodes.length === 0) throw new Error('no nodes');

    let totalModels = 0;
    let html = '';
    for (const node of data.nodes) {
      if (!node.models || node.models.length === 0) continue;
      const icon = OS_ICONS[node.os] || '💻';
      html += `<optgroup label="${icon} ${escHtml(node.name)} (${node.ip})">`;
      for (const m of node.models) {
        const modelName = m.name || m;
        const val = `${modelName}||${node.ip}:11434`;
        html += `<option value="${val}">${escHtml(modelName)}</option>`;
        totalModels++;
      }
      html += '</optgroup>';
    }
    if (totalModels === 0) throw new Error('no models');

    modelSel.innerHTML = html;
    const firstOpt = modelSel.querySelector('option');
    if (firstOpt) {
      const [name, url] = firstOpt.value.split('||');
      currentModel = name;
      currentOllamaUrl = `http://${url}`;
      modelSel.value = firstOpt.value;
    }

    promptEl.disabled = false;
    sendBtn.disabled = false;
    promptEl.placeholder = '输入消息...';
    return true;
  } catch {
    return false;
  }
}

async function tryLocalOllama() {
  try {
    const hostname = location.hostname;
    const r = await fetch(`http://${hostname}:11434/api/tags`, {
      signal: AbortSignal.timeout(5000)
    });
    if (!r.ok) throw new Error('offline');
    const data = await r.json();
    const models = data.models || [];
    if (models.length === 0) throw new Error('no models');

    modelSel.innerHTML = models.map(m =>
      `<option value="${m.name}||${hostname}:11434">${escHtml(m.name)}</option>`
    ).join('');
    currentModel = models[0].name;
    currentOllamaUrl = `http://${hostname}:11434`;
    modelSel.value = `${models[0].name}||${hostname}:11434`;

    promptEl.disabled = false;
    sendBtn.disabled = false;
    promptEl.placeholder = '输入消息...';
    return true;
  } catch {
    modelSel.innerHTML = '<option value="">离线</option>';
    promptEl.disabled = true;
    sendBtn.disabled = true;
    promptEl.placeholder = '未检测到 Ollama 模型';
    return false;
  }
}

function refreshModels() {
  fetchDiscovery().then(ok => {
    if (ok) addSysMsg('已扫描设备模型');
    else addSysMsg('未发现可用模型');
  });
}

modelSel.addEventListener('change', () => {
  const val = modelSel.value;
  if (val && val.includes('||')) {
    const [name, url] = val.split('||');
    currentModel = name;
    currentOllamaUrl = `http://${url}`;
  } else {
    currentModel = val;
    currentOllamaUrl = '';
  }
});

// ==================== Markdown 渲染 ====================
function renderMarkdown(text) {
  if (!text) return '';
  const placeholders = [];

  // 1. 保护代码块 ```...```
  let html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    placeholders.push(`<pre><code>${escHtml(code.trim())}</code></pre>`);
    return `\x00CODE${placeholders.length - 1}\x00`;
  });

  // 2. 保护 LaTeX 显示公式 $$...$$
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, (_, math) => {
    placeholders.push(`<div class="latex-block">${escHtml(math.trim())}</div>`);
    return `\x00CODE${placeholders.length - 1}\x00`;
  });

  // 3. 保护 LaTeX 行内公式 $...$
  html = html.replace(/\$([^$]+?)\$/g, (_, math) => {
    placeholders.push(`<span class="latex-inline">${escHtml(math.trim())}</span>`);
    return `\x00CODE${placeholders.length - 1}\x00`;
  });

  // 4. 保护行内代码 `...`
  html = html.replace(/`([^`]+)`/g, (_, code) => {
    placeholders.push(`<code>${escHtml(code)}</code>`);
    return `\x00CODE${placeholders.length - 1}\x00`;
  });

  // 5. Table detection — 连续的 | 行
  const lines = html.split('\n');
  const result = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    // 表格开始: 当前行含 | 且下一行是分隔符 |---|
    if (line.startsWith('|') && line.endsWith('|') &&
        i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i + 1].trim())) {
      const headerCells = line.split('|').filter(c => c.trim() !== '');
      const alignRow = lines[i + 1].trim();
      const aligns = alignRow.split('|').filter(c => c.trim() !== '').map(c => {
        if (c.startsWith(':') && c.endsWith(':')) return 'center';
        if (c.endsWith(':')) return 'right';
        return 'left';
      });
      let tableHtml = '<table><thead><tr>';
      headerCells.forEach((c, j) => {
        tableHtml += `<th style="text-align:${aligns[j] || 'left'}">${escHtml(c.trim())}</th>`;
      });
      tableHtml += '</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
        const cells = lines[i].trim().split('|').filter(c => c.trim() !== '');
        tableHtml += '<tr>';
        cells.forEach((c, j) => {
          tableHtml += `<td style="text-align:${aligns[j] || 'left'}">${escHtml(c.trim())}</td>`;
        });
        tableHtml += '</tr>';
        i++;
      }
      tableHtml += '</tbody></table>';
      result.push(tableHtml);
    } else {
      // 非表格行
      result.push(line);
      i++;
    }
  }
  html = result.join('\n');

  // 6. Headers
  html = html.replace(/^#### (.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');

  // 7. Bold & italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\b_(.+?)_\b/g, '<em>$1</em>');

  // 8. 水平线
  html = html.replace(/^---$/gm, '<hr>');

  // 9. 段落: 双换行 → </p><p>, 单换行 → <br>
  const paras = html.split('\n\n');
  html = paras.map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<h') || p.startsWith('<table') || p.startsWith('<pre') || p.startsWith('<hr') || p.startsWith('<div class="latex')) {
      return p;
    }
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');

  // 10. 恢复占位符
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, idx) => placeholders[parseInt(idx)]);

  return html;
}

// ==================== 聊天 ====================
function scrollBottom(force) {
  if (force || chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 100) {
    chatArea.scrollTop = chatArea.scrollHeight;
  }
}

// 滚动监听: AI 回答时翻页显示 ↓ 按钮
chatArea.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-bottom-btn');
  if (!btn) return;
  if (loading) {
    const atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 100;
    btn.classList.toggle('show', !atBottom);
  } else {
    btn.classList.remove('show');
  }
});

function addMsg(role, content, model, evalCount) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${role}`;
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    // 解析 <think> 标签
    const ts = content.indexOf('<think>');
    const te = content.indexOf('</think>');
    if (ts !== -1 && te !== -1 && te > ts) {
      const thinkText = content.slice(ts + 7, te);
      const mainText = (content.slice(0, ts) + content.slice(te + 8)).trim();
      const tSec = document.createElement('div');
      tSec.className = 'think-section';
      tSec.innerHTML = '<div class="think-header" onclick="toggleThink(this)">💭 思考过程 <span class="arrow collapsed">▼</span></div><div class="think-content">' + escHtml(thinkText) + '</div>';
      div.appendChild(tSec);
      const mDiv = document.createElement('div');
      mDiv.className = 'main-content';
      mDiv.innerHTML = renderMarkdown(mainText);
      div.appendChild(mDiv);
    } else {
      div.innerHTML = renderMarkdown(content);
    }
  } else {
    div.textContent = content;
  }
  if (model && role === 'assistant') {
    const tag = document.createElement('div');
    tag.className = 'model-tag';
    tag.textContent = model + (evalCount ? ' · ' + evalCount + ' tok' : '');
    div.appendChild(tag);
  }
  wrapper.appendChild(div);
  chatArea.appendChild(wrapper);
  scrollBottom(true);
  return div;
}

function addSysMsg(text) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper system';
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  wrapper.appendChild(div);
  chatArea.appendChild(wrapper);
  scrollBottom();
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function showTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper assistant';
  wrapper.id = 'typing-wrapper';
  wrapper.innerHTML = '<div class="msg assistant"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(wrapper);
  scrollBottom();
}

function hideTyping() {
  const w = document.getElementById('typing-wrapper');
  if (w) w.remove();
}

// ==================== 流式响应 ====================
async function streamChat(msgDiv) {
  const body = JSON.stringify({
    model: currentModel,
    messages: messages.slice(-20),
    stream: true
  });
  const r = await fetch(`${currentOllamaUrl}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body
  });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try {
      const err = await r.json();
      if (err.error) msg = err.error;
    } catch {}
    throw new Error(msg);
  }
  const reader = r.body.getReader();
  const decoder = new TextDecoder();
  let rawBuffer = '';
  let evalCount = 0;
  let foundThink = false;

  const searchSection = msgDiv.querySelector('.search-results');
  const searchContent = searchSection?.querySelector('.search-content');
  const thinkSection = msgDiv.querySelector('.think-section');
  const thinkContent = thinkSection?.querySelector('.think-content');
  const mainEl = msgDiv.querySelector('.main-content') || msgDiv;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const lines = decoder.decode(value, { stream: true }).split('\n').filter(Boolean);
    for (const line of lines) {
      try {
        const json = JSON.parse(line);
        if (json.error) { addSysMsg('Ollama 错误: ' + json.error); return { text: '', evalCount: 0 }; }
        if (json.done) {
          evalCount = json.eval_count || 0;
        }
        if (json.message?.content) {
          rawBuffer += json.message.content;

          // 解析 <think> 标签
          const ts = rawBuffer.indexOf('<think>');
          const te = rawBuffer.indexOf('</think>');

          if (thinkSection && ts !== -1) {
            foundThink = true;
            const ph = thinkSection.querySelector('.think-placeholder');
            if (ph) ph.remove();
            if (te === -1) {
              // 思考中 — 实时显示思考内容
              const before = rawBuffer.slice(0, ts);
              const thinking = rawBuffer.slice(ts + 7);
              mainEl.innerHTML = renderMarkdown(before);
              thinkContent.textContent = thinking;
              thinkContent.classList.add('open');
            } else {
              // 思考完成 — 渲染主内容，留待流结束后再折叠
              const before = rawBuffer.slice(0, ts);
              const thinking = rawBuffer.slice(ts + 7, te);
              const after = rawBuffer.slice(te + 8);
              mainEl.innerHTML = renderMarkdown(before + after);
              thinkContent.textContent = thinking;
            }
          } else {
            mainEl.innerHTML = renderMarkdown(rawBuffer);
          }
          scrollBottom();
        }
      } catch {}
    }
  }
  // 后处理 think 区域
  if (thinkSection) {
    const ph = thinkSection.querySelector('.think-placeholder');
    if (ph) {
      ph.textContent = '此模型未输出思考过程';
      ph.style.fontStyle = 'normal';
    }
    if (foundThink) {
      // 流结束后折叠思考内容
      thinkContent.classList.remove('open');
      const arrow = thinkSection.querySelector('.arrow');
      if (arrow) arrow.classList.add('collapsed');
    }
  }

  // 去掉 think 标签后返回纯文本
  const cleanText = rawBuffer.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
  return { text: cleanText, evalCount };
}

// ==================== 发送消息 ====================
async function send() {
  const text = promptEl.value.trim();
  if (!text || loading || !currentModel) return;
  promptEl.value = '';
  promptEl.style.height = 'auto';
  hideWelcome();

  loading = true;
  sendBtn.disabled = true;
  promptEl.disabled = true;

  // 没有当前对话则自动创建
  if (!currentConvId) await createConv(text);

  addMsg('user', text);
  messages.push({ role: 'user', content: text, model: currentModel });

  // 联网搜索
  if (searchEnabled) {
    addSysMsg('正在联网搜索...');
    const searchData = await api('/api/search', {
      method: 'POST',
      body: { query: text }
    });
    if (searchData && searchData.results && searchData.results.length > 0) {
      lastSearchQuery = text;
      lastSearchResults = searchData.results;
      // 把搜索结果作为 system 上下文注入
      const ctx = '以下是"' + text + '"的联网搜索结果，请基于这些信息回答：\n' +
        searchData.results.map((r, i) => `[${i+1}] ${r.title}\n${r.snippet}`).join('\n\n');
      messages.push({ role: 'system', content: ctx, model: '' });
      addSysMsg('已获取 ' + searchData.results.length + ' 条搜索结果');
    } else {
      addSysMsg('联网搜索未找到结果');
    }
  }

  // 保存当前搜索状态（防止下一条消息串扰）
  const hadSearch = searchEnabled && lastSearchResults && lastSearchResults.length > 0;
  const thisQuery = lastSearchQuery;
  const thisResults = hadSearch ? lastSearchResults : null;
  lastSearchResults = null; // 用完即清

  showTyping();
  try {
    // 构建助手消息结构: 搜索结果(可选) > 思考区域 > 主内容
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg assistant';

    // 搜索结果 (折叠)
    const srDiv = document.createElement('div');
    srDiv.className = 'search-results';
    srDiv.style.display = hadSearch ? '' : 'none';
    srDiv.innerHTML = '<div class="search-header" onclick="toggleSearchResults(this)">🔍 搜索: ' + escHtml(thisQuery) + ' <span class="arrow">▼</span></div><div class="search-content"></div>';
    if (hadSearch) {
      const sc = srDiv.querySelector('.search-content');
      sc.innerHTML = thisResults.map(r =>
        '<div class="r-item"><div class="r-title"><a href="' + escHtml(r.link || '#') + '" target="_blank" style="color:#f59e0b;text-decoration:none">' + escHtml(r.title) + '</a></div><div class="r-snippet">' + escHtml(r.snippet) + '</div></div>'
      ).join('');
    }
    msgDiv.appendChild(srDiv);

    // 思考区域
    const thinkDiv = document.createElement('div');
    thinkDiv.className = 'think-section';
    thinkDiv.innerHTML = '<div class="think-header" onclick="toggleThink(this)">💭 思考过程 <span class="arrow">▼</span></div><div class="think-content"><span class="think-placeholder" style="color:#666;font-style:italic">等待模型输出...</span></div>';
    msgDiv.appendChild(thinkDiv);

    // 主内容
    const mainDiv = document.createElement('div');
    mainDiv.className = 'main-content';
    msgDiv.appendChild(mainDiv);

    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper assistant';
    wrapper.appendChild(msgDiv);
    const typingWrapper = document.getElementById('typing-wrapper');
    if (typingWrapper) typingWrapper.replaceWith(wrapper);
    else chatArea.appendChild(wrapper);

    const { text: reply, evalCount } = await streamChat(msgDiv);
    messages.push({ role: 'assistant', content: reply, model: currentModel, eval_count: evalCount });
    // 添加模型标签
    const tag = document.createElement('div');
    tag.className = 'model-tag';
    tag.textContent = currentModel + (evalCount ? ' · ' + evalCount + ' tok' : '');
    msgDiv.appendChild(tag);
    await saveConv();
    await refreshConvList();
    scrollBottom(true);
  } catch (err) {
    hideTyping();
    addSysMsg('错误: ' + err.message);
  }
  loading = false;
  sendBtn.disabled = false;
  promptEl.disabled = false;
  promptEl.focus();
}

sendBtn.addEventListener('click', send);
promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
});

// ==================== 对话管理 (DB) ====================
async function api(url, opts = {}, timeoutMs = 10000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(HOST + url, {
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      ...opts,
      signal: ctrl.signal,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (r.status === 401) { localStorage.clear(); window.location.replace('/login.html'); return null; }
    if (!r.ok && r.status !== 201 && r.status !== 200) return null;
    return r.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('timeout');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

function logout() {
  fetch('/api/auth/logout', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });
  localStorage.clear();
  window.location.replace('/login.html');
}

async function refreshConvList() {
  const convs = await api('/api/conversations') || [];
  convList.innerHTML = convs.length === 0
    ? '<div class="conv-empty">暂无历史对话</div>'
    : convs.map(c => `
      <div class="conv-item${c.id === currentConvId ? ' active' : ''}" onclick="loadConv(${c.id})">
        <div class="conv-title">${escHtml(c.title)}</div>
        <div class="conv-meta">
          <span>${c.model || '--'}</span>
          <span>${c.created_at?.slice(5,16) || ''}</span>
          <button class="del-btn" onclick="event.stopPropagation();deleteConv(${c.id})" title="删除">&#x1d5eb;</button>
        </div>
      </div>
    `).join('');
}

async function createConv(firstMsg) {
  const title = firstMsg.slice(0, 30) + (firstMsg.length > 30 ? '...' : '');
  const r = await api('/api/conversations', {
    method: 'POST',
    body: { title, model: currentModel }
  });
  if (r) {
    currentConvId = r.id;
    convTitle.textContent = title;
    convLoaded = true;
    await refreshConvList();
  }
}

async function saveConv() {
  if (!currentConvId) return;
  // 只保存 sent 之后新增的消息（最后 2 条）
  const newMsgs = messages.slice(-2);
  await api(`/api/conversations/${currentConvId}`, {
    method: 'POST',
    body: { messages: newMsgs, model: currentModel }
  });
}

async function loadConv(id) {
  const conv = await api(`/api/conversations/${id}`);
  if (!conv) return;
  currentConvId = conv.id;
  currentModel = conv.model || currentModel;
  // 恢复模型选择及对应的 Ollama URL
  if (currentModel) {
    const opts = modelSel.querySelectorAll('option');
    for (const opt of opts) {
      if (opt.textContent === currentModel) {
        modelSel.value = opt.value;
        if (opt.value.includes('||')) {
          const [name, url] = opt.value.split('||');
          currentOllamaUrl = `http://${url}`;
        }
        break;
      }
    }
  }
  messages = conv.messages || [];
  convTitle.textContent = conv.title;
  convLoaded = true;

  // 渲染消息
  chatArea.innerHTML = '';
  if (messages.length === 0) {
    chatArea.innerHTML = '<div class="welcome" id="welcome"><h2>空对话</h2><p>发送消息开始</p></div>';
  } else {
    for (const m of messages) addMsg(m.role, m.content, m.model, m.eval_count);
  }
  closeSidebar();
  scrollBottom();
}

async function deleteConv(id) {
  if (!confirm('删除此对话？')) return;
  await api(`/api/conversations/${id}`, { method: 'DELETE' });
  if (currentConvId === id) newChat();
  await refreshConvList();
}

function newChat() {
  currentConvId = null;
  messages = [];
  convTitle.textContent = '新对话';
  chatArea.innerHTML = '<div class="welcome" id="welcome"><h2>新对话</h2><p>选择模型，开始对话</p></div>';
  closeSidebar();
  convLoaded = false;
}

// ==================== 侧边栏 ====================
function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

// ==================== 搜索 & 思考 ====================
function toggleSearch() {
  searchEnabled = !searchEnabled;
  document.getElementById('search-btn').classList.toggle('active', searchEnabled);
}

function toggleThink(headerEl) {
  const content = headerEl.parentElement.querySelector('.think-content');
  const arrow = headerEl.querySelector('.arrow');
  if (content) {
    content.classList.toggle('open');
    if (arrow) arrow.classList.toggle('collapsed');
  }
}

function toggleSearchResults(headerEl) {
  const content = headerEl.parentElement.querySelector('.search-content');
  const arrow = headerEl.querySelector('.arrow');
  if (content) {
    content.style.display = content.style.display === 'none' ? 'block' : 'none';
    if (arrow) arrow.classList.toggle('collapsed');
  }
}

// ==================== 工具 ====================
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== 设置面板 ====================
function toggleSettings() {
  document.getElementById('settings-overlay').classList.toggle('show');
  document.getElementById('settings-panel').classList.toggle('show');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('show');
  document.getElementById('settings-panel').classList.remove('show');
}

function toggleTheme() {
  const isDark = document.getElementById('theme-switch').checked;
  document.body.classList.toggle('light', !isDark);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function loadTheme() {
  const theme = localStorage.getItem('theme') || 'dark';
  const isDark = theme !== 'light';
  document.getElementById('theme-switch').checked = isDark;
  document.body.classList.toggle('light', !isDark);
}

// ==================== 初始化 ====================
(async () => {
  document.getElementById('user-tag').textContent = USER.username;
  if (USER.role === 'admin') {
    document.getElementById('admin-link').style.display = '';
  }
  loadTheme();
  await fetchDiscovery();
  await refreshConvList();
  promptEl.focus();
  // 后台轮询发现
  setInterval(() => fetchDiscovery(), 60000);
  // 后台刷新对话列表
  setInterval(() => refreshConvList(), 30000);
})();
