<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Remote - 登录</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111; color: #e0e0e0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1a1a1a; border: 1px solid #333; border-radius: 16px;
    padding: 32px 24px; width: 100%; max-width: 380px;
  }
  .card h1 { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .card .subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 24px; }

  .tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  .tabs button {
    flex: 1; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
    background: #222; color: #888; border: none; transition: .15s;
  }
  .tabs button.active { background: #4ade80; color: #111; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 10px 14px; background: #222; border: 1px solid #444;
    border-radius: 8px; color: #eee; font-size: 15px; font-family: inherit; outline: none;
  }
  .field input:focus { border-color: #4ade80; }

  .submit-btn {
    width: 100%; padding: 12px; background: #4ade80; color: #111; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }

  .msg { text-align: center; font-size: 13px; margin-top: 12px; padding: 8px; border-radius: 6px; }
  .msg.error { color: #f87171; background: #2d1515; }
  .msg.success { color: #4ade80; background: #152d1f; }

  .admin-link { text-align: center; margin-top: 20px; font-size: 12px; }
  .admin-link a { color: #555; text-decoration: none; }
  .admin-link a:hover { color: #888; }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>AI Remote Compute</h1>
  <p class="subtitle">登录以访问你的 AI 算力网格</p>

  <div class="tabs">
    <button id="tab-login" class="active" onclick="switchTab('login')">登录</button>
    <button id="tab-register" onclick="switchTab('register')">注册</button>
  </div>

  <form id="form" onsubmit="handleSubmit(event)">
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" autocomplete="username" required minlength="2">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" autocomplete="current-password" required minlength="4">
    </div>
    <div class="field" id="confirm-group" style="display:none">
      <label>确认密码</label>
      <input type="password" id="confirm-password" autocomplete="new-password" minlength="4">
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">登录</button>
    <div id="form-msg"></div>
  </form>

  <div class="admin-link"><a href="/admin.html">管理面板</a></div>
</div>

<script>
let mode = 'login';

const API = '/api/auth';

function switchTab(tab) {
  mode = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('confirm-group').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = tab === 'login' ? '登录' : '注册';
  document.getElementById('form-msg').innerHTML = '';
  document.getElementById('form').reset();
}

function showMsg(text, type) {
  const el = document.getElementById('form-msg');
  el.innerHTML = `<div class="msg ${type}">${escHtml(text)}</div>`;
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (mode === 'register') {
    const confirm = document.getElementById('confirm-password').value;
    if (password !== confirm) return showMsg('两次密码不一致', 'error');
    btn.disabled = true;
    try {
      const r = await fetch(API + '/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();
      if (!r.ok) { showMsg(data.error, 'error'); return; }
      showMsg('注册已提交，等待管理员审批', 'success');
      setTimeout(() => switchTab('login'), 2000);
    } catch { showMsg('网络错误', 'error'); }
    finally { btn.disabled = false; }
  } else {
    btn.disabled = true;
    try {
      const r = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();
      if (!r.ok) { showMsg(data.error, 'error'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      setTimeout(function(){ window.location.replace('/chat.html?v=' + Date.now()); }, 100);
    } catch { showMsg('网络错误', 'error'); }
    finally { btn.disabled = false; }
  }
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 已登录则直接跳转
(async () => {
  const token = localStorage.getItem('token');
  if (!token) return;
  try {
    const r = await fetch(API + '/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.ok) { setTimeout(function(){ window.location.replace('/chat.html?v=' + Date.now()); }, 100); }
  } catch {}
})();
</script>
</body>
</html>
